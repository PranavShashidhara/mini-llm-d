          ports:
            - containerPort: 8000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_ROLE
              value: "prefill"
            - name: OTEL_ENDPOINT
              value: "http://jaeger.monitoring:4317"
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "14Gi"
              cpu: "4"
            requests:
              nvidia.com/gpu: "1"
              memory: "12Gi"
              cpu: "2"
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: kv-cache-shared
              mountPath: /kv-cache
      volumes:
        - name: kv-cache-shared
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: model-cache
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
