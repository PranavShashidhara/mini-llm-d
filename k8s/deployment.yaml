---
# Router deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: mini-llmd
  labels:
    app: mini-llmd
    component: router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mini-llmd
      component: router
  template:
    metadata:
      labels:
        app: mini-llmd
        component: router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: router
          image: mini-llmd-router:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
          env:
            - name: POD_ENDPOINTS
              value: "http://inference-combined-0.inference-headless.mini-llmd:8000,http://inference-combined-1.inference-headless.mini-llmd:8000"
            - name: ROUTING_MODE
              value: "prefix_cache"
            - name: CIRCUIT_BREAK_MS
              value: "100"
            - name: POLL_INTERVAL_MS
              value: "500"
            - name: OTEL_ENDPOINT
              value: "http://jaeger.monitoring:4317"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 15
