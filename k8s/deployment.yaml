---
# k8s/deployment.yaml
# Inference pod StatefulSet — runs vLLM + FastAPI per GPU pod.
# Deploy prefill and decode pools separately by setting POD_ROLE.

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: inference-combined
  namespace: mini-llmd
  labels:
    app: mini-llmd
    role: combined
spec:
  serviceName: inference-headless
  replicas: 1
  selector:
    matchLabels:
      app: mini-llmd
      role: combined
  template:
    metadata:
      labels:
        app: mini-llmd
        role: combined
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: inference
          image: mini-llmd-inference:latest
          imagePullPolicy: Never   # minikube local image
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_ROLE
              value: "combined"
            - name: CONFIG_PATH
              value: "/app/config.yaml"
            - name: OTEL_ENDPOINT
              value: "http://jaeger.monitoring:4317"
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "14Gi"
              cpu: "4"
            requests:
              nvidia.com/gpu: "1"
              memory: "12Gi"
              cpu: "2"
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: kv-cache-shared
              mountPath: /kv-cache
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: kv-cache-shared
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      nodeSelector:
        kubernetes.io/os: linux

  volumeClaimTemplates:
    - metadata:
        name: model-cache
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
