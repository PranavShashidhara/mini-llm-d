---
# k8s/custom-metrics.yaml
# Prometheus Adapter rules that expose custom metrics to the Kubernetes
# HPA API server.
#
# Apply with:
#   kubectl apply -f k8s/custom-metrics.yaml
# or include in the helm install values for prometheus-adapter.

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: monitoring
data:
  config.yaml: |
    rules:
      # tokens_per_second_per_pod
      # Exposed as an External metric for the HPA.
      - seriesQuery: 'router_pod_tokens_per_sec{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace: {resource: "namespace"}
            pod:       {resource: "pod"}
        name:
          matches: "router_pod_tokens_per_sec"
          as:      "tokens_per_second_per_pod"
        metricsQuery: 'avg(router_pod_tokens_per_sec{<<.LabelMatchers>>})'

      # Average queue depth across router-observed pods
      - seriesQuery: 'router_pod_queue_depth{namespace!=""}'
        resources:
          overrides:
            namespace: {resource: "namespace"}
        name:
          matches: "router_pod_queue_depth"
          as:      "router_pod_queue_depth_avg"
        metricsQuery: 'avg(router_pod_queue_depth{<<.LabelMatchers>>})'

      # TTFT p95 (for dashboards; not used directly by HPA)
      - seriesQuery: 'router_ttft_seconds_bucket'
        name:
          as: "router_ttft_p95_seconds"
        metricsQuery: >
          histogram_quantile(0.95,
            sum(rate(router_ttft_seconds_bucket[2m])) by (le))

      # TPOT p95
      - seriesQuery: 'router_tpot_seconds_bucket'
        name:
          as: "router_tpot_p95_seconds"
        metricsQuery: >
          histogram_quantile(0.95,
            sum(rate(router_tpot_seconds_bucket[2m])) by (le))
