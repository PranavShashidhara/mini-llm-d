# k8s/grafana-values.yaml
# Helm values for grafana/grafana — auto-provisions mini-llmd dashboard.

adminPassword: "mini-llmd-admin"

service:
  type: NodePort
  nodePort: 30300

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring:80
        access: proxy
        isDefault: true
        uid: prometheus

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: mini-llmd
        folder: mini-llmd
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/mini-llmd

dashboardsConfigMaps:
  mini-llmd: "grafana-dashboards"

grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
  auth.anonymous:
    enabled: true
    org_role: Viewer

resources:
  limits:
    memory: "256Mi"
    cpu: "200m"
  requests:
    memory: "128Mi"
    cpu: "100m"
