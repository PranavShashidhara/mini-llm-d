# k8s/rdma-device-plugin.yaml
# RDMA device plugin DaemonSet for minikube / Kubernetes
# Source: https://github.com/k8snetworkplumbingwg/rdma-device-plugin
#
# In --no-gpu / laptop mode this manifest is NOT applied.
# It is included for documentation and for when you graduate to a real
# RoCEv2-capable cluster.
#
# Apply:
#   kubectl apply -f k8s/rdma-device-plugin.yaml
#
# Verify:
#   kubectl describe node minikube | grep rdma
#   kubectl get pods -n kube-system -l app=rdma-device-plugin

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rdma-device-plugin
  namespace: kube-system
  labels:
    app: rdma-device-plugin
spec:
  selector:
    matchLabels:
      app: rdma-device-plugin
  template:
    metadata:
      labels:
        app: rdma-device-plugin
    spec:
      hostNetwork: true
      containers:
        - name: rdma-device-plugin
          image: ghcr.io/k8snetworkplumbingwg/rdma-device-plugin:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: sys
              mountPath: /sys
              readOnly: true
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: sys
          hostPath:
            path: /sys
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
