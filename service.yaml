---
# Headless service — gives each StatefulSet pod a stable DNS name:
#   inference-0.inference.mini-llm-d.svc.cluster.local
#   inference-1.inference.mini-llm-d.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: mini-llm-d
  labels:
    app: inference
spec:
  clusterIP: None    # headless
  selector:
    app: inference
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
# Router deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: mini-llm-d
  labels:
    app: router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: router
          image: mini-llmd-router:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: POD_ENDPOINTS
              value: "http://inference-0.inference.mini-llm-d.svc.cluster.local:8000,http://inference-1.inference.mini-llm-d.svc.cluster.local:8000,http://inference-2.inference.mini-llm-d.svc.cluster.local:8000,http://inference-3.inference.mini-llm-d.svc.cluster.local:8000"
            - name: POLL_INTERVAL_SECS
              value: "1.0"
            - name: POD_TIMEOUT_SECS
              value: "0.1"
            - name: CIRCUIT_COOLDOWN_SECS
              value: "30.0"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
---
# Router service — ClusterIP for internal access, NodePort for Locust
apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: mini-llm-d
  labels:
    app: router
spec:
  type: NodePort
  selector:
    app: router
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900   # access via $(minikube ip):30900
      name: http
---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: mini-llm-d
