---
# Inference pod StatefulSet
# Using StatefulSet so each pod gets a stable DNS name (inference-0, inference-1, …)
# enabling the router to address pods directly for KV-cache-aware routing.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: inference
  namespace: mini-llm-d
  labels:
    app: inference
spec:
  serviceName: inference
  replicas: 1          # HPA manages this at runtime; start with 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      containers:
        - name: inference
          image: mini-llmd-inference:latest
          imagePullPolicy: Never   # image loaded via `minikube image load`
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "14Gi"
              cpu: "4"
            requests:
              nvidia.com/gpu: "1"
              memory: "12Gi"
              cpu: "2"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true   # not required if model is pre-cached
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60    # vLLM needs time to load weights
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: model-cache
          hostPath:
            path: /tmp/mini-llmd-model-cache   # minikube host path for caching
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: inference-config
  # No PVC template needed — we use the hostPath volume above for local dev
---
# ConfigMap: inference/config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-config
  namespace: mini-llm-d
data:
  config.yaml: |
    model:
      name: "meta-llama/Llama-3.2-3B-Instruct"
      max_model_len: 4096
      dtype: "auto"
    server:
      host: "0.0.0.0"
      port: 8000
    metrics_window_secs: 10
