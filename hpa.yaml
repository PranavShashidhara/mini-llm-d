---
# HorizontalPodAutoscaler targeting the custom tokens_per_second_per_pod metric.
# The metric is exposed by the router's /metrics endpoint and translated to a
# Kubernetes external metric by the Prometheus Adapter.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-hpa
  namespace: mini-llm-d
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: inference
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: External
      external:
        metric:
          name: tokens_per_second_per_pod
        target:
          type: AverageValue
          # Scale up when tokens/sec per pod exceeds this threshold.
          # Set to ~80% of observed single-pod baseline; update after Week 1 measurement.
          averageValue: "80"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60       # wait 60s before adding pods
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60                # add at most 1 pod per minute
    scaleDown:
      stabilizationWindowSeconds: 120      # wait 120s before removing pods
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
